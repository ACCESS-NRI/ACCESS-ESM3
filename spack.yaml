# This is a Spack Environment file.
#
# It describes a set of packages to be installed, along with
# configuration settings.
# Instructions for editing this file are found in
# https://github.com/ACCESS-NRI/model-deployment-template/blob/main/spack.yaml
spack:
  # _name and _version are reserved definitions that inform deployments
  definitions:
  - _name: [access-esm3]
  - _version: [2026.03.000]
  specs:
  - access-esm3
  packages:
    # Main Dependencies
    access3:
      require:
      - '@git.74d7aa725f8f142dbe07ec375173cd727fecdc79=stable'          # rCM3 modified branch
      - configurations=MOM6-CICE6-UM13
      - fflags="-march=skylake-avx512 -mtune=skylake-avx512 -unroll"
      - cflags="-march=skylake-avx512 -mtune=skylake-avx512 -unroll"
      - cxxflags="-march=skylake-avx512 -mtune=skylake-avx512 -unroll"
    um:
      require:
      - casim_ref=um13.5 jules_ref=JULES_vn7.0 shumlib_ref=um13.5 socrates_ref=um13.5 ukca_ref=b42593d0c8fe744f9cc1d1556a664fec792f4766 um_ref=regional_cm3_stable-ish
      - fflags="-march=skylake-avx512 -mtune=skylake-avx512 -unroll"
      - cflags="-march=skylake-avx512 -mtune=skylake-avx512 -unroll"
      - cxxflags="-march=skylake-avx512 -mtune=skylake-avx512 -unroll"
    access-cice:
      require:
      - '@git.a6bb0046fa4f63e07cd6222dd401e0537a158207=CICE6.6.3-0'
      - io_type=PIO
      - fflags="-march=skylake-avx512 -mtune=skylake-avx512 -unroll"
      - cflags="-march=skylake-avx512 -mtune=skylake-avx512 -unroll"
      - cxxflags="-march=skylake-avx512 -mtune=skylake-avx512 -unroll"
    access-mom6:
      require:
      - '@2025.07.000'
      - 'fflags="-march=skylake-avx512 -mtune=skylake-avx512 -unroll"'
      - 'cflags="-march=skylake-avx512 -mtune=skylake-avx512 -unroll"'
      - 'cxxflags="-march=skylake-avx512 -mtune=skylake-avx512 -unroll"'
    access3-share:
      require:
      - '@git.68b11be086fceb97124aa3b1dba799c01f8d3413=stable'           # rCM3 modified branch
      - fflags="-march=skylake-avx512 -mtune=skylake-avx512 -unroll"
      - cflags="-march=skylake-avx512 -mtune=skylake-avx512 -unroll"
      - cxxflags="-march=skylake-avx512 -mtune=skylake-avx512 -unroll"
    access-generic-tracers:
      require:
      - '@2025.08.000'
      - fflags="-march=skylake-avx512 -mtune=skylake-avx512 -unroll"
      - cflags="-march=skylake-avx512 -mtune=skylake-avx512 -unroll"
      - cxxflags="-march=skylake-avx512 -mtune=skylake-avx512 -unroll"
    access-mocsy:
      require:
      - '@2025.07.002'
      - fflags="-march=skylake-avx512 -mtune=skylake-avx512 -unroll"
      - cflags="-march=skylake-avx512 -mtune=skylake-avx512 -unroll"
      - cxxflags="-march=skylake-avx512 -mtune=skylake-avx512 -unroll"

    # Other Dependencies
    gcom:
      require:
      # - '@8.0'
      - fflags="-march=skylake-avx512 -mtune=skylake-avx512 -unroll"
      - cflags="-march=skylake-avx512 -mtune=skylake-avx512 -unroll"
      - cxxflags="-march=skylake-avx512 -mtune=skylake-avx512 -unroll"
    esmf:
      require:
      - '@8.7.0'
      - fflags="-march=skylake-avx512 -mtune=skylake-avx512 -unroll -traceback"
      - cflags="-march=skylake-avx512 -mtune=skylake-avx512 -unroll -fno-omit-frame-pointer"
      - cxxflags="-march=skylake-avx512 -mtune=skylake-avx512 -unroll -fno-omit-frame-pointer"
    parallelio:
      require:
      - '@2.6.8'
      - fflags="-g -traceback"
      - cflags="-g -fno-omit-frame-pointer"
      - cxxflags="-g -fno-omit-frame-pointer"
    netcdf-c:
      require:
      - '@4.9.3'
      - build_system=cmake build_type=RelWithDebInfo
    netcdf-fortran:
      require:
      - '@4.6.2'
    fms:
      require:
      - '@2025.03'
      - cppflags="-DMAXFIELDMETHODS_=600"
    openmpi:
      require:
      - '@4.1.7'
    fortranxml:
      require:
      - '@4.1.2'
    python:
      require:
      - '@3.11.7'   # force spack to use the system python install

    # Compilers
    c:
      require:
      - intel-oneapi-compilers-classic@2021.10.0
    cxx:
      require:
      - intel-oneapi-compilers-classic@2021.10.0
    fortran:
      require:
      - intel-oneapi-compilers-classic@2021.10.0

    all:
      prefer:
      - target=x86_64_v4
  view: true
  concretizer:
    unify: true
  develop: {}
