# This is a Spack Environment file.
#
# It describes a set of packages to be installed, along with
# configuration settings.
# Instructions for editing this file are found in
# https://github.com/ACCESS-NRI/model-deployment-template/blob/main/spack.yaml
spack:
  # _name and _version are reserved definitions that inform deployments
  definitions:
  - _name: [access-esm3]
  - _version: [2026.03.000]
  specs:
  - access-esm3
  packages:
    # Main Dependencies
    access3:
      require:
      - '@git.4af9840e6436961f7ea4ef1bd79f57ec198481dd=stable'
      - configurations=MOM6-CICE6-UM13
      - fflags="-march=sapphirerapids -mtune=sapphirerapids -unroll"
      - cflags="-march=sapphirerapids -mtune=sapphirerapids -unroll"
      - cxxflags="-march=sapphirerapids -mtune=sapphirerapids -unroll"
    um:
      require:
      - '@13.0'
      - casim_ref=um13.0 jules_ref=JULES_vn7.0 shumlib_ref=um13.0 socrates_ref=um13.0 ukca_ref=b42593d0c8fe744f9cc1d1556a664fec792f4766 um_ref=vn13.0_nuopc_spack_build
      - fflags="-march=sapphirerapids -mtune=sapphirerapids -unroll"
      - cflags="-march=sapphirerapids -mtune=sapphirerapids -unroll"
      - cxxflags="-march=sapphirerapids -mtune=sapphirerapids -unroll"
    access-cice:
      require:
      - '@git.3286c36f9b9125ffddbc4d3aa9f98ff87ae1aded=CICE6.6.3-0'
      - io_type=PIO
      - fflags="-march=sapphirerapids -mtune=sapphirerapids -unroll"
      - cflags="-march=sapphirerapids -mtune=sapphirerapids -unroll"
      - cxxflags="-march=sapphirerapids -mtune=sapphirerapids -unroll"
    access-mom6:
      require:
      - '@2026.01.001'
      - fflags="-march=sapphirerapids -mtune=sapphirerapids -unroll"
      - cflags="-march=sapphirerapids -mtune=sapphirerapids -unroll"
      - cxxflags="-march=sapphirerapids -mtune=sapphirerapids -unroll"
    access3-share:
      require:
      - '@git.4af9840e6436961f7ea4ef1bd79f57ec198481dd=stable'
      - fflags="-march=sapphirerapids -mtune=sapphirerapids -unroll"
      - cflags="-march=sapphirerapids -mtune=sapphirerapids -unroll"
      - cxxflags="-march=sapphirerapids -mtune=sapphirerapids -unroll"
    access-generic-tracers:
      require:
      - '@2026.02.001'
      - fflags="-march=sapphirerapids -mtune=sapphirerapids -unroll"
      - cflags="-march=sapphirerapids -mtune=sapphirerapids -unroll"
      - cxxflags="-march=sapphirerapids -mtune=sapphirerapids -unroll"
    access-mocsy:
      require:
      - '@2025.07.002'
      - fflags="-march=sapphirerapids -mtune=sapphirerapids -unroll"
      - cflags="-march=sapphirerapids -mtune=sapphirerapids -unroll"
      - cxxflags="-march=sapphirerapids -mtune=sapphirerapids -unroll"

    # Other Dependencies
    gcom:
      require:
      # - '@8.0'
      - fflags="-march=sapphirerapids -mtune=sapphirerapids -unroll"
      - cflags="-march=sapphirerapids -mtune=sapphirerapids -unroll"
      - cxxflags="-march=sapphirerapids -mtune=sapphirerapids -unroll"
    esmf:
      require:
      - '@8.9.1'
      - fflags="-march=sapphirerapids -mtune=sapphirerapids -unroll -traceback"
      - cflags="-march=sapphirerapids -mtune=sapphirerapids -unroll -fno-omit-frame-pointer"
      - cxxflags="-march=sapphirerapids -mtune=sapphirerapids -unroll -fno-omit-frame-pointer"
    parallelio:
      require:
      - '@2.6.8'
      - fflags="-g -traceback"
      - cflags="-g -fno-omit-frame-pointer"
      - cxxflags="-g -fno-omit-frame-pointer"
    netcdf-c:
      require:
      - '@4.9.3'
      - build_system=cmake build_type=RelWithDebInfo
    netcdf-fortran:
      require:
      - '@4.6.2'
    fms:
      require:
      - '@2025.03'
      - cppflags="-DMAXFIELDMETHODS_=600"
    openmpi:
      require:
      - '@4.1.7'
    fortranxml:
      require:
      - '@4.1.2'
    python:
      require:
      - '@3.11.7'   # force spack to use the system python install

    # Compilers
    c:
      require:
      - intel-oneapi-compilers-classic@2021.10.0
    cxx:
      require:
      - intel-oneapi-compilers-classic@2021.10.0
    fortran:
      require:
      - intel-oneapi-compilers-classic@2021.10.0

    all:
      prefer:
      - target=x86_64_v4
  view: true
  concretizer:
    unify: true
  develop: {}
