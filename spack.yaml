# This is a Spack Environment file.
#
# It describes a set of packages to be installed, along with
# configuration settings.
# Instructions for editing this file are found in
# https://github.com/ACCESS-NRI/model-deployment-template/blob/main/spack.yaml
spack:
  # _name and _version are reserved definitions that inform deployments
  definitions:
  - _name: [access-esm3]
  - _version: [2026.06.000]
  specs:
  - access-esm3
  packages:
    # Main Dependencies
    access3:
      require:
      - '@git.a66762b7ddd157e6339fe6fd6c3c8ca7f1f7f20d=stable'
      - configurations=MOM6-CICE6-UM13
      - fflags="-march=skylake-avx512 -mtune=skylake-avx512 -unroll"
      - cflags="-march=skylake-avx512 -mtune=skylake-avx512 -unroll"
      - cxxflags="-march=skylake-avx512 -mtune=skylake-avx512 -unroll"
    um:
      require:
      - '@13.0'
      - casim_ref=um13.0 jules_ref=JULES_vn7.0 shumlib_ref=um13.0 socrates_ref=um13.0 ukca_ref=b42593d0c8fe744f9cc1d1556a664fec792f4766 um_ref=0850f33a9f9551c429bb8e6a14bedc98a699b106
      - fflags="-march=skylake-avx512 -mtune=skylake-avx512 -unroll"
      - cflags="-march=skylake-avx512 -mtune=skylake-avx512 -unroll"
      - cxxflags="-march=skylake-avx512 -mtune=skylake-avx512 -unroll"
    access-cice:
      require:
      - '@git.a98ca97971d1eb699bcdd18ebe7c6660361606c4=stable'
      - io_type=PIO
      - fflags="-march=skylake-avx512 -mtune=skylake-avx512 -unroll"
      - cflags="-march=skylake-avx512 -mtune=skylake-avx512 -unroll"
      - cxxflags="-march=skylake-avx512 -mtune=skylake-avx512 -unroll"
    access-mom6:
      require:
      - '@2025.07.000'
      - 'fflags="-march=skylake-avx512 -mtune=skylake-avx512 -unroll"'
      - 'cflags="-march=skylake-avx512 -mtune=skylake-avx512 -unroll"'
      - 'cxxflags="-march=skylake-avx512 -mtune=skylake-avx512 -unroll"'
    access3-share:
      require:
      - '@git.a66762b7ddd157e6339fe6fd6c3c8ca7f1f7f20d=stable'
      - fflags="-march=skylake-avx512 -mtune=skylake-avx512 -unroll"
      - cflags="-march=skylake-avx512 -mtune=skylake-avx512 -unroll"
      - cxxflags="-march=skylake-avx512 -mtune=skylake-avx512 -unroll"
    access-generic-tracers:
      require:
      - '@2025.08.000'
      - fflags="-march=skylake-avx512 -mtune=skylake-avx512 -unroll"
      - cflags="-march=skylake-avx512 -mtune=skylake-avx512 -unroll"
      - cxxflags="-march=skylake-avx512 -mtune=skylake-avx512 -unroll"
    access-mocsy:
      require:
      - '@2025.07.002'
      - fflags="-march=skylake-avx512 -mtune=skylake-avx512 -unroll"
      - cflags="-march=skylake-avx512 -mtune=skylake-avx512 -unroll"
      - cxxflags="-march=skylake-avx512 -mtune=skylake-avx512 -unroll"

    # Other Dependencies
    gcom:
      require:
      - '@7.8'
      - fflags="-march=skylake-avx512 -mtune=skylake-avx512 -unroll"
      - cflags="-march=skylake-avx512 -mtune=skylake-avx512 -unroll"
      - cxxflags="-march=skylake-avx512 -mtune=skylake-avx512 -unroll"
    esmf:
      require:
      - '@8.7.0'
      - 'fflags="-march=skylake-avx512 -mtune=skylake-avx512 -unroll"'
      - 'cflags="-march=skylake-avx512 -mtune=skylake-avx512 -unroll"'
      - 'cxxflags="-march=skylake-avx512 -mtune=skylake-avx512 -unroll"'
    parallelio:
      require:
      - '@2.6.2'
    netcdf-c:
      require:
      - '@4.9.2'
      - build_system=cmake build_type=RelWithDebInfo
    netcdf-fortran:
      require:
      - '@4.6.1'
    fms:
      require:
      - '@2025.03'
      - cppflags="-DMAXFIELDMETHODS_=600"
    openmpi:
      require:
      - '@4.1.7'
    fortranxml:
      require:
      - '@4.1.2'
    python:
      require:
      - '@3.11.7'   # force spack to use the system python install
    gcc-runtime:
      require:
        - '%gcc'

    # Compilers
    c:
      require:
      - intel-oneapi-compilers-classic@2021.10.0
    cxx:
      require:
      - intel-oneapi-compilers-classic@2021.10.0
    fortran:
      require:
      - intel-oneapi-compilers-classic@2021.10.0

    all:
      prefer:
      - target=x86_64
  view: true
  concretizer:
    unify: true
  develop: {}
